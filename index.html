<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    a-scene, canvas, video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 20px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="status">SCANNEN: richt op de puzzel</div>

  <a-scene
    embedded
    mindar-image="imageTargetSrc: wilhelmshaven.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; warmupTolerance: 3; missTolerance: 20;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <!-- Grote debug marker: fel en niet te missen -->
      <a-box
        position="0 0 0.3"
        width="0.9"
        height="0.9"
        depth="0.15"
        color="#FFD700"
        opacity="0.95"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
      </a-box>

      <a-text
        value="AR TEST"
        color="#ff0000"
        align="center"
        width="4"
        position="0 0.8 0.3">
      </a-text>

    </a-entity>
  </a-scene>

  <script>
    const target = document.querySelector("#target");
    const status = document.querySelector("#status");

    target.addEventListener("targetFound", () => {
      status.textContent = "TARGET GEVONDEN";
      status.style.background = "rgba(0,120,0,0.75)";
    });

    target.addEventListener("targetLost", () => {
      status.textContent = "SCANNEN: richt op de puzzel";
      status.style.background = "rgba(0,0,0,0.65)";
    });
  </script>
</body>
</html>
