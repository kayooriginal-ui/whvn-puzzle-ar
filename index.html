<title>WHVN WUNDERBAR AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 10 !important;
  pointer-events: none !important;
}

canvas,
.a-canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999 !important;
  pointer-events: none !important;
  background: transparent !important;
}

#hint {
  position: fixed;
  left: 50%;
  top: 16px;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(0,0,0,.55);
  color: white;
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 15px;
  text-align: center;
  pointer-events: none;
}

#photoButton {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  z-index: 10000;

  border: none;
  border-radius: 999px;
  padding: 14px 28px;

  font-size: 18px;
  font-weight: 700;

  background: rgba(0,130,0,.90);
  color: white;

  box-shadow: 0 4px 14px rgba(0,0,0,.35);
  min-width: 140px;
}

#photoButton:active {
  transform: translateX(-50%) scale(0.96);
}

@media screen and (orientation: landscape) {
  #hint {
    top: 12px;
    font-size: 14px;
  }

  #photoButton {
    bottom: 16px;
  }
}

<script>
function forceLayers() {
  document.querySelectorAll("video").forEach(v => {
    v.style.zIndex = "0";
    v.style.display = "block";
    v.style.opacity = "1";
  });

  const aframeCanvas = document.querySelector("canvas.a-canvas") || document.querySelector("a-scene canvas") || Array.from(document.querySelectorAll("canvas")).pop();

  document.querySelectorAll("canvas").forEach(c => {
    c.style.zIndex = "999";
    c.style.display = "block";
    c.style.opacity = "1";
    c.style.background = "transparent";
    c.style.pointerEvents = "none";
  });

  if (aframeCanvas) {
    aframeCanvas.style.zIndex = "999";
  }

  document.querySelectorAll("a-scene").forEach(s => {
    s.style.zIndex = "10";
  });
}

function drawVideoCover(ctx, video, canvasWidth, canvasHeight) {
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (!vw || !vh) return;

  const videoRatio = vw / vh;
  const canvasRatio = canvasWidth / canvasHeight;

  let sx, sy, sw, sh;

  if (videoRatio > canvasRatio) {
    sh = vh;
    sw = vh * canvasRatio;
    sx = (vw - sw) / 2;
    sy = 0;
  } else {
    sw = vw;
    sh = vw / canvasRatio;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);
}

function getARCanvas() {
  return document.querySelector("canvas.a-canvas") ||
         document.querySelector("a-scene canvas") ||
         Array.from(document.querySelectorAll("canvas")).pop();
}

setInterval(forceLayers, 200);

document.getElementById("photoButton").addEventListener("click", async () => {
  const video = document.querySelector("video");
  const arCanvas = getARCanvas();

  if (!video || !arCanvas) {
    alert("Foto konnte nicht gespeichert werden.");
    return;
  }

  await new Promise(resolve => requestAnimationFrame(resolve));

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const outputWidth = Math.round(window.innerWidth * dpr);
  const outputHeight = Math.round(window.innerHeight * dpr);

  const output = document.createElement("canvas");
  output.width = outputWidth;
  output.height = outputHeight;

  const ctx = output.getContext("2d");

  try {
    drawVideoCover(ctx, video, outputWidth, outputHeight);
    ctx.drawImage(arCanvas, 0, 0, outputWidth, outputHeight);

    const link = document.createElement("a");
    link.download = "wunderbar-ar-foto.png";
    link.href = output.toDataURL("image/png");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (error) {
    alert("Foto konnte nicht gespeichert werden. Bitte verwenden Sie die Screenshot-Funktion Ihres Smartphones.");
  }
});
</script>
