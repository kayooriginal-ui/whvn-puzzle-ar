<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHVN Puzzle AR Debug</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 0 !important;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 1 !important;
}

canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 5 !important;
  pointer-events: none !important;
}

#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.7);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 9999;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="status">Richt scanner op de puzzel</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: wilhelmshaven.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; warmupTolerance: 3; missTolerance: 20;"
  color-space="sRGB"
  renderer="alpha: true; antialias: true; colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <a-plane
    position="0 0 0.1"
    width="2"
    height="2"
    color="#FFD700"
    opacity="0.95"
    animation="property: rotation; to: 0 0 360; loop: true; dur: 3000">
  </a-plane>

  <a-text
    value="AR TEST"
    color="#ff0000"
    align="center"
    width="5"
    position="0 1.3 0.2">
  </a-text>

</a-entity>

</a-scene>

<script>
const target = document.querySelector("#target");
const status = document.querySelector("#status");

function fixLayers() {
  document.querySelectorAll("video").forEach(v => {
    v.style.zIndex = "1";
    v.style.display = "block";
    v.style.opacity = "1";
  });
  document.querySelectorAll("canvas").forEach(c => {
    c.style.zIndex = "5";
    c.style.display = "block";
    c.style.opacity = "1";
    c.style.pointerEvents = "none";
  });
}
setInterval(fixLayers, 300);

target.addEventListener("targetFound", () => {
  status.innerHTML = "TARGET GEVONDEN";
  status.style.background = "green";
  fixLayers();
});

target.addEventListener("targetLost", () => {
  status.innerHTML = "Richt scanner op de puzzel";
  status.style.background = "rgba(0,0,0,.7)";
});
</script>

</body>
</html>
