<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHVN WUNDERBAR AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 10 !important;
  pointer-events: none !important;
}

canvas,
.a-canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999 !important;
  pointer-events: none !important;
  background: transparent !important;
}

#hint {
  position: fixed;
  left: 50%;
  top: 14px;
  transform: translateX(-50%);
  z-index: 10000;
  background: rgba(0,0,0,.55);
  color: white;
  padding: 9px 15px;
  border-radius: 999px;
  font-size: 14px;
  text-align: center;
  pointer-events: none;
}

#photoButton {
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  z-index: 10000;
  border: 3px solid white;
  border-radius: 50%;
  width: 64px;
  height: 64px;
  background: #ff7a00;
  box-shadow: 0 4px 16px rgba(0,0,0,.38);
}

#photoButton:active {
  transform: translateX(-50%) scale(0.94);
}

#rotateOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 20000;
  background: rgba(0,0,0,.78);
  color: white;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  padding: 30px;
}
</style>
</head>

<body>

<div id="hint">Kamera auf das Puzzle richten</div>
<button id="photoButton" aria-label="Foto machen"></button>
<div id="rotateOverlay">Ansicht wird angepasst…</div>

<a-scene
  id="scene"
  embedded
  mindar-image="imageTargetSrc: wilhelmshaven-floor.mind; autoStart: true; uiScanning: no; uiLoading: no; filterMinCF: 0.00001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 30;"
  color-space="sRGB"
  renderer="alpha: true; antialias: true; colorManagement: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets>
  <img id="wunderbarImg" src="wunderbar_balloon_text.png" crossorigin="anonymous">
</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <a-image
    id="wunderbar"
    src="#wunderbarImg"
    position="0 0.34 0.20"
    width="1.65"
    height="0.46"
    material="transparent: true; alphaTest: 0.01; side: double; opacity: 1"
  ></a-image>

  <a-entity id="confetti" position="0 1.75 0.30"></a-entity>

</a-entity>

</a-scene>

<script>
function forceLayers() {
  document.querySelectorAll("video").forEach(v => {
    v.style.zIndex = "0";
    v.style.display = "block";
    v.style.opacity = "1";
    v.style.objectFit = "cover";
  });

  document.querySelectorAll("canvas").forEach(c => {
    c.style.zIndex = "999";
    c.style.display = "block";
    c.style.opacity = "1";
    c.style.background = "transparent";
    c.style.pointerEvents = "none";
  });
}

function createConfetti() {
  const confetti = document.getElementById("confetti");
  const colors = ["#FFD700", "#ff004c", "#00d4ff", "#00ff66", "#ff8c00", "#cc66ff", "#ffffff", "#00FFFF", "#FF69B4"];

  for (let i = 0; i < 60; i++) {
    const p = document.createElement("a-plane");

    const x = -2.1 + (i % 15) * 0.30;
    const y = 0.15 + Math.floor(i / 15) * 0.38 + ((i * 37) % 20) / 100;
    const z = ((i * 17) % 9) / 100;

    const endX = x + ((((i * 31) % 100) / 100) - 0.5) * 0.8;
    const endY = -3.35 - ((i * 13) % 60) / 100;
    const endZ = z + 0.04;

    const width = 0.045 + ((i * 7) % 5) * 0.012;
    const height = 0.020 + ((i * 11) % 4) * 0.006;
    const color = colors[i % colors.length];

    const dur = 900 + ((i * 97) % 650);
    const spinDur = 520 + ((i * 53) % 450);
    const spinDir = i % 2 === 0 ? 720 : -720;

    p.setAttribute("width", width.toFixed(3));
    p.setAttribute("height", height.toFixed(3));
    p.setAttribute("color", color);
    p.setAttribute("position", `${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}`);
    p.setAttribute("rotation", `0 0 ${(i * 23) % 180}`);
    p.setAttribute("animation__fall", `property: position; from: ${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}; to: ${endX.toFixed(2)} ${endY.toFixed(2)} ${endZ.toFixed(2)}; loop: true; dur: ${dur}; easing: linear`);
    p.setAttribute("animation__spin", `property: rotation; to: 0 0 ${spinDir}; loop: true; dur: ${spinDur}; easing: linear`);

    confetti.appendChild(p);
  }
}

function isLandscapeNow() {
  return window.innerWidth > window.innerHeight ||
         Math.abs(window.orientation || 0) === 90 ||
         (screen.orientation && String(screen.orientation.type).includes("landscape"));
}

function drawVideoCover(ctx, video, canvasWidth, canvasHeight) {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  const videoRatio = vw / vh;
  const canvasRatio = canvasWidth / canvasHeight;

  let sx, sy, sw, sh;

  if (videoRatio > canvasRatio) {
    sh = vh;
    sw = vh * canvasRatio;
    sx = (vw - sw) / 2;
    sy = 0;
  } else {
    sw = vw;
    sh = vw / canvasRatio;
    sx = 0;
    sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);
}

function getARCanvas() {
  return document.querySelector("canvas.a-canvas") ||
         document.querySelector("a-scene canvas") ||
         Array.from(document.querySelectorAll("canvas")).pop();
}

function makeBaseCapture() {
  const video = document.querySelector("video");
  const arCanvas = getARCanvas();

  if (!video || !arCanvas) {
    throw new Error("Missing video or AR canvas");
  }

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.round(window.innerWidth * dpr);
  const h = Math.round(window.innerHeight * dpr);

  const output = document.createElement("canvas");
  output.width = w;
  output.height = h;

  const ctx = output.getContext("2d");

  drawVideoCover(ctx, video, w, h);
  ctx.drawImage(arCanvas, 0, 0, w, h);

  return output;
}

function rotateCanvasIfNeeded(sourceCanvas) {
  if (!isLandscapeNow()) {
    return sourceCanvas;
  }

  // Als Chrome/Samsung de capture alsnog als portrait behandelt,
  // draaien we het beeld fysiek 90 graden naar landscape.
  if (sourceCanvas.width > sourceCanvas.height) {
    return sourceCanvas;
  }

  const rotated = document.createElement("canvas");
  rotated.width = sourceCanvas.height;
  rotated.height = sourceCanvas.width;

  const ctx = rotated.getContext("2d");
  ctx.translate(rotated.width / 2, rotated.height / 2);
  ctx.rotate(90 * Math.PI / 180);
  ctx.drawImage(sourceCanvas, -sourceCanvas.width / 2, -sourceCanvas.height / 2);

  return rotated;
}

document.getElementById("photoButton").addEventListener("click", async () => {
  await new Promise(resolve => requestAnimationFrame(resolve));

  try {
    const baseCapture = makeBaseCapture();
    const finalCapture = rotateCanvasIfNeeded(baseCapture);

    const link = document.createElement("a");
    link.download = isLandscapeNow() ? "wunderbar-ar-landscape.png" : "wunderbar-ar-portrait.png";
    link.href = finalCapture.toDataURL("image/png");

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (error) {
    alert("Foto konnte nicht gespeichert werden. Bitte verwenden Sie die Screenshot-Funktion Ihres Smartphones.");
  }
});

let rotating = false;

function handleOrientationChange() {
  if (rotating) return;
  rotating = true;

  document.getElementById("rotateOverlay").style.display = "flex";

  setTimeout(() => {
    window.location.reload();
  }, 900);
}

window.addEventListener("orientationchange", handleOrientationChange);

if (screen.orientation && screen.orientation.addEventListener) {
  screen.orientation.addEventListener("change", handleOrientationChange);
}

createConfetti();
setInterval(forceLayers, 300);
</script>

</body>
</html>
