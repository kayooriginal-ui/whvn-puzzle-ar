<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WHVN Puzzle AR Test</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:transparent;
}

#status{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  color:white;
  padding:12px 20px;
  border-radius:12px;
  z-index:9999;
  font-size:18px;
}

a-scene{
  position:fixed !important;
  inset:0 !important;
  width:100vw !important;
  height:100vh !important;
}
</style>
</head>

<body>

<div id="status">
Richt scanner op de puzzel
</div>

<a-scene
mindar-image="imageTargetSrc: wilhelmshaven.mind; autoStart: true;"
color-space="sRGB"
renderer="colorManagement:true, physicallyCorrectLights"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
embedded
>

<a-camera position="0 0 0"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <a-box
    position="0 0.5 0"
    depth="0.3"
    height="0.8"
    width="0.8"
    color="#FFD700"
    animation="
      property: rotation;
      to: 0 360 0;
      loop:true;
      dur:4000">
  </a-box>

  <a-text
    value="AR TEST"
    color="red"
    align="center"
    width="4"
    position="0 1.2 0">
  </a-text>

</a-entity>

</a-scene>

<script>

const target=document.querySelector("#target");
const status=document.querySelector("#status");

target.addEventListener("targetFound",()=>{
  status.innerHTML="TARGET GEVONDEN";
  status.style.background="green";
});

target.addEventListener("targetLost",()=>{
  status.innerHTML="Richt scanner op de puzzel";
  status.style.background="rgba(0,0,0,.7)";
});

</script>

</body>
</html>
