<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>WHVN Puzzle AR Test</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 1 !important;
}

canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 2 !important;
  pointer-events: none;
}

#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.7);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 9999;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="status">Richt scanner op de puzzel</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: wilhelmshaven.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; warmupTolerance: 3; missTolerance: 20;"
  color-space="sRGB"
  renderer="alpha: true; antialias: true; colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <a-box
    position="0 0.5 0.25"
    depth="0.3"
    height="0.8"
    width="0.8"
    color="#FFD700"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
  </a-box>

  <a-text
    value="AR TEST"
    color="red"
    align="center"
    width="4"
    position="0 1.2 0.25">
  </a-text>

</a-entity>

</a-scene>

<script>
const target = document.querySelector("#target");
const status = document.querySelector("#status");

function forceVideoVisible() {
  const videos = document.querySelectorAll("video");
  videos.forEach(video => {
    video.style.position = "fixed";
    video.style.inset = "0";
    video.style.width = "100vw";
    video.style.height = "100vh";
    video.style.objectFit = "cover";
    video.style.zIndex = "1";
    video.style.display = "block";
    video.style.opacity = "1";
  });

  const canvases = document.querySelectorAll("canvas");
  canvases.forEach(canvas => {
    canvas.style.position = "fixed";
    canvas.style.inset = "0";
    canvas.style.width = "100vw";
    canvas.style.height = "100vh";
    canvas.style.zIndex = "2";
    canvas.style.pointerEvents = "none";
  });
}

setInterval(forceVideoVisible, 500);

target.addEventListener("targetFound", () => {
  status.innerHTML = "TARGET GEVONDEN";
  status.style.background = "green";
});

target.addEventListener("targetLost", () => {
  status.innerHTML = "Richt scanner op de puzzel";
  status.style.background = "rgba(0,0,0,.7)";
});
</script>

</body>
</html>
