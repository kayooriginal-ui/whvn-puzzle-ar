<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHVN WUNDERBAR AR - B3.1 Confetti Rain</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 10 !important;
  pointer-events: none !important;
}

canvas,
.a-canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999 !important;
  pointer-events: none !important;
  background: transparent !important;
}

#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.7);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 9999;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="status">Richt scanner op de puzzel</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: wilhelmshaven.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.00001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 30;"
  color-space="sRGB"
  renderer="alpha: true; antialias: true; colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets>
  <img id="wunderbarImg" src="wunderbar_balloon_text.png">
</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <!-- WUNDERBAR rustig zichtbaar -->
  <a-image
    id="wunderbar"
    src="#wunderbarImg"
    position="0 0.32 0.18"
    width="3.25"
    height="0.77"
    material="transparent: true; alphaTest: 0.01; side: double; opacity: 1"
  ></a-image>

  <!-- RIJKERE CONFETTI-REGEN -->
  <a-entity id="confetti" position="0 1.45 0.28">

    <a-plane width="0.08" height="0.03" color="#ff004c" position="-1.65 0.10 0"
      animation__fall="property: position; from: -1.65 0.10 0; to: -1.35 -2.10 0.05; loop: true; dur: 2600; easing: linear"
      animation__spin="property: rotation; to: 0 0 720; loop: true; dur: 900; easing: linear"></a-plane>

    <a-plane width="0.06" height="0.025" color="#00d4ff" position="-1.40 0.45 0.02"
      animation__fall="property: position; from: -1.40 0.45 0.02; to: -1.70 -2.00 0.04; loop: true; dur: 3100; easing: linear"
      animation__spin="property: rotation; to: 0 0 -650; loop: true; dur: 1100; easing: linear"></a-plane>

    <a-plane width="0.09" height="0.035" color="#FFD700" position="-1.15 0.25 0.01"
      animation__fall="property: position; from: -1.15 0.25 0.01; to: -0.90 -2.20 0.07; loop: true; dur: 2900; easing: linear"
      animation__spin="property: rotation; to: 0 0 760; loop: true; dur: 1000; easing: linear"></a-plane>

    <a-plane width="0.07" height="0.03" color="#00ff66" position="-0.90 0.60 0"
      animation__fall="property: position; from: -0.90 0.60 0; to: -1.05 -2.15 0.04; loop: true; dur: 3400; easing: linear"
      animation__spin="property: rotation; to: 0 0 -720; loop: true; dur: 1200; easing: linear"></a-plane>

    <a-plane width="0.08" height="0.03" color="#ff8c00" position="-0.65 0.15 0.03"
      animation__fall="property: position; from: -0.65 0.15 0.03; to: -0.35 -2.05 0.06; loop: true; dur: 2500; easing: linear"
      animation__spin="property: rotation; to: 0 0 680; loop: true; dur: 850; easing: linear"></a-plane>

    <a-plane width="0.06" height="0.025" color="#cc66ff" position="-0.40 0.50 0.02"
      animation__fall="property: position; from: -0.40 0.50 0.02; to: -0.65 -2.25 0.05; loop: true; dur: 3300; easing: linear"
      animation__spin="property: rotation; to: 0 0 -800; loop: true; dur: 1250; easing: linear"></a-plane>

    <a-plane width="0.09" height="0.035" color="#ffffff" position="-0.15 0.25 0"
      animation__fall="property: position; from: -0.15 0.25 0; to: 0.10 -2.10 0.07; loop: true; dur: 2800; easing: linear"
      animation__spin="property: rotation; to: 0 0 700; loop: true; dur: 1000; easing: linear"></a-plane>

    <a-plane width="0.07" height="0.03" color="#ff004c" position="0.10 0.70 0.02"
      animation__fall="property: position; from: 0.10 0.70 0.02; to: -0.10 -2.30 0.04; loop: true; dur: 3600; easing: linear"
      animation__spin="property: rotation; to: 0 0 -690; loop: true; dur: 1050; easing: linear"></a-plane>

    <a-plane width="0.08" height="0.03" color="#00d4ff" position="0.35 0.20 0"
      animation__fall="property: position; from: 0.35 0.20 0; to: 0.60 -2.00 0.05; loop: true; dur: 2700; easing: linear"
      animation__spin="property: rotation; to: 0 0 740; loop: true; dur: 950; easing: linear"></a-plane>

    <a-plane width="0.06" height="0.025" color="#FFD700" position="0.60 0.55 0.03"
      animation__fall="property: position; from: 0.60 0.55 0.03; to: 0.35 -2.20 0.06; loop: true; dur: 3400; easing: linear"
      animation__spin="property: rotation; to: 0 0 -760; loop: true; dur: 1150; easing: linear"></a-plane>

    <a-plane width="0.09" height="0.035" color="#00ff66" position="0.85 0.30 0.02"
      animation__fall="property: position; from: 0.85 0.30 0.02; to: 1.10 -2.15 0.04; loop: true; dur: 3000; easing: linear"
      animation__spin="property: rotation; to: 0 0 680; loop: true; dur: 900; easing: linear"></a-plane>

    <a-plane width="0.07" height="0.03" color="#ff8c00" position="1.10 0.65 0"
      animation__fall="property: position; from: 1.10 0.65 0; to: 0.90 -2.25 0.07; loop: true; dur: 3700; easing: linear"
      animation__spin="property: rotation; to: 0 0 -720; loop: true; dur: 1250; easing: linear"></a-plane>

    <a-plane width="0.08" height="0.03" color="#cc66ff" position="1.35 0.25 0.01"
      animation__fall="property: position; from: 1.35 0.25 0.01; to: 1.65 -2.05 0.05; loop: true; dur: 2800; easing: linear"
      animation__spin="property: rotation; to: 0 0 760; loop: true; dur: 980; easing: linear"></a-plane>

    <a-plane width="0.06" height="0.025" color="#ffffff" position="1.60 0.55 0.02"
      animation__fall="property: position; from: 1.60 0.55 0.02; to: 1.30 -2.30 0.06; loop: true; dur: 3500; easing: linear"
      animation__spin="property: rotation; to: 0 0 -700; loop: true; dur: 1150; easing: linear"></a-plane>

    <!-- extra kleinere snippers -->
    <a-plane width="0.04" height="0.02" color="#FFD700" position="-1.75 0.80 0.04"
      animation__fall="property: position; from: -1.75 0.80 0.04; to: -1.55 -2.00 0.05; loop: true; dur: 4000; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#00FFFF" position="-1.25 0.90 0.03"
      animation__fall="property: position; from: -1.25 0.90 0.03; to: -1.05 -2.20 0.05; loop: true; dur: 3900; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#FF69B4" position="-0.75 0.85 0.04"
      animation__fall="property: position; from: -0.75 0.85 0.04; to: -0.95 -2.10 0.05; loop: true; dur: 4200; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#ffffff" position="-0.25 0.95 0.03"
      animation__fall="property: position; from: -0.25 0.95 0.03; to: 0.05 -2.15 0.06; loop: true; dur: 4100; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#00ff66" position="0.25 0.80 0.04"
      animation__fall="property: position; from: 0.25 0.80 0.04; to: 0.05 -2.30 0.05; loop: true; dur: 4300; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#FFD700" position="0.75 0.95 0.03"
      animation__fall="property: position; from: 0.75 0.95 0.03; to: 0.95 -2.05 0.06; loop: true; dur: 4000; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#00d4ff" position="1.25 0.85 0.04"
      animation__fall="property: position; from: 1.25 0.85 0.04; to: 1.05 -2.25 0.05; loop: true; dur: 4150; easing: linear"></a-plane>

    <a-plane width="0.04" height="0.02" color="#ff004c" position="1.75 0.90 0.03"
      animation__fall="property: position; from: 1.75 0.90 0.03; to: 1.45 -2.20 0.06; loop: true; dur: 3950; easing: linear"></a-plane>

  </a-entity>

</a-entity>

</a-scene>

<script>
const target = document.querySelector("#target");
const status = document.querySelector("#status");

function forceLayers() {
  document.querySelectorAll("video").forEach(v => {
    v.style.zIndex = "0";
    v.style.display = "block";
    v.style.opacity = "1";
  });

  document.querySelectorAll("canvas").forEach(c => {
    c.style.zIndex = "999";
    c.style.display = "block";
    c.style.opacity = "1";
    c.style.background = "transparent";
    c.style.pointerEvents = "none";
  });

  document.querySelectorAll("a-scene").forEach(s => {
    s.style.zIndex = "10";
  });
}

setInterval(forceLayers, 200);

target.addEventListener("targetFound", () => {
  status.innerHTML = "WUNDERBAR!";
  status.style.background = "rgba(0,130,0,.75)";
  forceLayers();
});

target.addEventListener("targetLost", () => {
  status.innerHTML = "Richt scanner op de puzzel";
  status.style.background = "rgba(0,0,0,.7)";
});
</script>

</body>
</html>
