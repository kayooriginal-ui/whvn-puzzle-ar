<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHVN WUNDERBAR AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 10 !important;
  pointer-events: none !important;
}

canvas,
.a-canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999 !important;
  pointer-events: none !important;
  background: transparent !important;
}

#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.7);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 9999;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="status">Richt scanner op de puzzel</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: wilhelmshaven.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; warmupTolerance: 3; missTolerance: 20;"
  color-space="sRGB"
  renderer="alpha: true; antialias: true; colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <!-- B1 TEST: WUNDERBAR ALS ÉÉN RUSTIG WOORD -->
  <a-text
    value="WUNDERBAR"
    color="#FFD700"
    align="center"
    width="4.4"
    position="0 0.35 0.12"
    rotation="0 0 0"
  ></a-text>

</a-entity>

  <!-- EXTRA GOLD SHADOW / GLOW TEXT BEHIND -->
  <a-text
    value="WUNDERBAR"
    color="#FFB300"
    align="center"
    width="5.2"
    position="0 0.51 0.04"
    opacity="0.45">
  </a-text>

  <!-- CONFETTI BOM -->
  <a-entity position="0 0.35 0.12">

    <a-plane width="0.10" height="0.035" color="#ff004c" position="-0.1 0 0"
      animation="property: position; to: -1.7 1.3 0.25; loop: true; dur: 1800"></a-plane>
    <a-plane width="0.09" height="0.035" color="#00d4ff" position="0.1 0 0"
      animation="property: position; to: 1.6 1.2 0.25; loop: true; dur: 1600"></a-plane>
    <a-plane width="0.08" height="0.030" color="#FFD700" position="0 0 0"
      animation="property: position; to: 0.4 1.6 0.25; loop: true; dur: 1900"></a-plane>
    <a-plane width="0.10" height="0.035" color="#00ff66" position="0 0 0"
      animation="property: position; to: -0.9 1.5 0.25; loop: true; dur: 1700"></a-plane>
    <a-plane width="0.09" height="0.030" color="#ff8c00" position="0 0 0"
      animation="property: position; to: 1.0 1.45 0.25; loop: true; dur: 2100"></a-plane>
    <a-plane width="0.08" height="0.030" color="#cc66ff" position="0 0 0"
      animation="property: position; to: -1.3 0.95 0.25; loop: true; dur: 1500"></a-plane>
    <a-plane width="0.11" height="0.035" color="#ffffff" position="0 0 0"
      animation="property: position; to: 1.35 0.95 0.25; loop: true; dur: 1750"></a-plane>

    <a-plane width="0.08" height="0.030" color="#ff004c" position="0 0 0"
      animation="property: position; to: -1.6 -0.6 0.2; loop: true; dur: 2300"></a-plane>
    <a-plane width="0.09" height="0.030" color="#00d4ff" position="0 0 0"
      animation="property: position; to: 1.5 -0.5 0.2; loop: true; dur: 2200"></a-plane>
    <a-plane width="0.08" height="0.030" color="#FFD700" position="0 0 0"
      animation="property: position; to: -0.4 -0.8 0.2; loop: true; dur: 2400"></a-plane>
    <a-plane width="0.10" height="0.035" color="#00ff66" position="0 0 0"
      animation="property: position; to: 0.8 -0.7 0.2; loop: true; dur: 2500"></a-plane>

  </a-entity>

</a-entity>

</a-scene>

<script>
const target = document.querySelector("#target");
const status = document.querySelector("#status");

function forceLayers() {
  document.querySelectorAll("video").forEach(v => {
    v.style.zIndex = "0";
    v.style.display = "block";
    v.style.opacity = "1";
  });

  document.querySelectorAll("canvas").forEach(c => {
    c.style.zIndex = "999";
    c.style.display = "block";
    c.style.opacity = "1";
    c.style.background = "transparent";
    c.style.pointerEvents = "none";
  });

  document.querySelectorAll("a-scene").forEach(s => {
    s.style.zIndex = "10";
  });
}

setInterval(forceLayers, 200);

target.addEventListener("targetFound", () => {
  status.innerHTML = "WUNDERBAR!";
  status.style.background = "rgba(0,130,0,.75)";
  forceLayers();
});

target.addEventListener("targetLost", () => {
  status.innerHTML = "Richt scanner op de puzzel";
  status.style.background = "rgba(0,0,0,.7)";
});
</script>

</body>
</html>
