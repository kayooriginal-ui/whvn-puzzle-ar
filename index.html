<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WHVN WUNDERBAR AR - B3.2</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 10 !important;
  pointer-events: none !important;
}

canvas,
.a-canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999 !important;
  pointer-events: none !important;
  background: transparent !important;
}

#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.7);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 9999;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="status">Richt scanner op de puzzel</div>

<a-scene
  embedded
  mindar-image="imageTargetSrc: wilhelmshaven-floor.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.00001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 30;"
  color-space="sRGB"
  renderer="alpha: true; antialias: true; colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets>
  <img id="wunderbarImg" src="wunderbar_balloon_text.png">
</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex: 0">

  <!-- WUNDERBAR BALLON PNG -->
  <a-image
    id="wunderbar"
    src="#wunderbarImg"
    position="0 0.34 0.20"
    width="3.35"
    height="0.92"
    material="transparent: true; alphaTest: 0.01; side: double; opacity: 1"
    scale="0.2 0.2 0.2"
    animation__pop="property: scale; to: 1 1 1; dur: 900; easing: easeOutElastic"
  ></a-image>

  <!-- CONFETTI REGEN - VOLLER, SNELLER, LANGER -->
  <a-entity id="confetti" position="0 1.75 0.30">

    <!-- rij 1 -->
    <a-plane width="0.09" height="0.035" color="#FFD700" position="-1.85 0.20 0" animation__fall="property: position; from: -1.85 0.20 0; to: -1.50 -3.00 0.06; loop: true; dur: 1500; easing: linear" animation__spin="property: rotation; to: 0 0 720; loop: true; dur: 700; easing: linear"></a-plane>
    <a-plane width="0.08" height="0.03" color="#ff004c" position="-1.60 0.55 0.02" animation__fall="property: position; from: -1.60 0.55 0.02; to: -1.90 -3.10 0.04; loop: true; dur: 1700; easing: linear" animation__spin="property: rotation; to: 0 0 -720; loop: true; dur: 800; easing: linear"></a-plane>
    <a-plane width="0.07" height="0.03" color="#00d4ff" position="-1.35 0.05 0.01" animation__fall="property: position; from: -1.35 0.05 0.01; to: -1.10 -2.90 0.05; loop: true; dur: 1400; easing: linear" animation__spin="property: rotation; to: 0 0 680; loop: true; dur: 650; easing: linear"></a-plane>
    <a-plane width="0.09" height="0.035" color="#00ff66" position="-1.10 0.40 0.03" animation__fall="property: position; from: -1.10 0.40 0.03; to: -1.30 -3.20 0.06; loop: true; dur: 1800; easing: linear" animation__spin="property: rotation; to: 0 0 -760; loop: true; dur: 900; easing: linear"></a-plane>
    <a-plane width="0.08" height="0.03" color="#ff8c00" position="-0.85 0.70 0.01" animation__fall="property: position; from: -0.85 0.70 0.01; to: -0.55 -3.00 0.04; loop: true; dur: 1600; easing: linear" animation__spin="property: rotation; to: 0 0 720; loop: true; dur: 750; easing: linear"></a-plane>
    <a-plane width="0.07" height="0.03" color="#cc66ff" position="-0.60 0.25 0.02" animation__fall="property: position; from: -0.60 0.25 0.02; to: -0.85 -3.15 0.05; loop: true; dur: 1750; easing: linear" animation__spin="property: rotation; to: 0 0 -690; loop: true; dur: 850; easing: linear"></a-plane>

    <!-- rij 2 -->
    <a-plane width="0.09" height="0.035" color="#ffffff" position="-0.35 0.60 0" animation__fall="property: position; from: -0.35 0.60 0; to: -0.05 -3.05 0.06; loop: true; dur: 1550; easing: linear" animation__spin="property: rotation; to: 0 0 700; loop: true; dur: 700; easing: linear"></a-plane>
    <a-plane width="0.08" height="0.03" color="#FFD700" position="-0.10 0.10 0.02" animation__fall="property: position; from: -0.10 0.10 0.02; to: 0.10 -3.25 0.04; loop: true; dur: 1650; easing: linear" animation__spin="property: rotation; to: 0 0 -740; loop: true; dur: 780; easing: linear"></a-plane>
    <a-plane width="0.07" height="0.03" color="#ff004c" position="0.15 0.45 0.01" animation__fall="property: position; from: 0.15 0.45 0.01; to: -0.10 -3.10 0.06; loop: true; dur: 1450; easing: linear" animation__spin="property: rotation; to: 0 0 720; loop: true; dur: 720; easing: linear"></a-plane>
    <a-plane width="0.09" height="0.035" color="#00d4ff" position="0.40 0.75 0.03" animation__fall="property: position; from: 0.40 0.75 0.03; to: 0.70 -3.00 0.05; loop: true; dur: 1850; easing: linear" animation__spin="property: rotation; to: 0 0 -760; loop: true; dur: 920; easing: linear"></a-plane>
    <a-plane width="0.08" height="0.03" color="#00ff66" position="0.65 0.25 0.01" animation__fall="property: position; from: 0.65 0.25 0.01; to: 0.35 -3.20 0.04; loop: true; dur: 1500; easing: linear" animation__spin="property: rotation; to: 0 0 680; loop: true; dur: 700; easing: linear"></a-plane>
    <a-plane width="0.07" height="0.03" color="#ff8c00" position="0.90 0.55 0.02" animation__fall="property: position; from: 0.90 0.55 0.02; to: 1.15 -3.05 0.06; loop: true; dur: 1700; easing: linear" animation__spin="property: rotation; to: 0 0 -720; loop: true; dur: 820; easing: linear"></a-plane>

    <!-- rij 3 -->
    <a-plane width="0.09" height="0.035" color="#cc66ff" position="1.15 0.15 0" animation__fall="property: position; from: 1.15 0.15 0; to: 0.90 -3.15 0.06; loop: true; dur: 1550; easing: linear" animation__spin="property: rotation; to: 0 0 760; loop: true; dur: 740; easing: linear"></a-plane>
    <a-plane width="0.08" height="0.03" color="#ffffff" position="1.40 0.50 0.02" animation__fall="property: position; from: 1.40 0.50 0.02; to: 1.65 -3.10 0.04; loop: true; dur: 1750; easing: linear" animation__spin="property: rotation; to: 0 0 -700; loop: true; dur: 880; easing: linear"></a-plane>
    <a-plane width="0.07" height="0.03" color="#FFD700" position="1.65 0.80 0.01" animation__fall="property: position; from: 1.65 0.80 0.01; to: 1.35 -3.25 0.05; loop: true; dur: 1900; easing: linear" animation__spin="property: rotation; to: 0 0 720; loop: true; dur: 950; easing: linear"></a-plane>
    <a-plane width="0.09" height="0.035" color="#ff004c" position="1.90 0.25 0.03" animation__fall="property: position; from: 1.90 0.25 0.03; to: 1.70 -3.00 0.06; loop: true; dur: 1500; easing: linear" animation__spin="property: rotation; to: 0 0 -760; loop: true; dur: 760; easing: linear"></a-plane>

    <!-- kleine extra snippers voor dichtheid -->
    <a-plane width="0.045" height="0.02" color="#00FFFF" position="-1.75 1.05 0.04" animation__fall="property: position; from: -1.75 1.05 0.04; to: -1.55 -3.25 0.05; loop: true; dur: 2000; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#FF69B4" position="-1.25 1.15 0.03" animation__fall="property: position; from: -1.25 1.15 0.03; to: -1.05 -3.10 0.05; loop: true; dur: 2100; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#FFD700" position="-0.75 1.05 0.04" animation__fall="property: position; from: -0.75 1.05 0.04; to: -0.95 -3.20 0.05; loop: true; dur: 1950; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#00ff66" position="-0.25 1.20 0.03" animation__fall="property: position; from: -0.25 1.20 0.03; to: 0.05 -3.05 0.06; loop: true; dur: 2050; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#00d4ff" position="0.25 1.05 0.04" animation__fall="property: position; from: 0.25 1.05 0.04; to: 0.05 -3.25 0.05; loop: true; dur: 2150; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#ffffff" position="0.75 1.15 0.03" animation__fall="property: position; from: 0.75 1.15 0.03; to: 0.95 -3.15 0.06; loop: true; dur: 2000; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#ff8c00" position="1.25 1.05 0.04" animation__fall="property: position; from: 1.25 1.05 0.04; to: 1.05 -3.30 0.05; loop: true; dur: 2200; easing: linear"></a-plane>
    <a-plane width="0.045" height="0.02" color="#ff004c" position="1.75 1.20 0.03" animation__fall="property: position; from: 1.75 1.20 0.03; to: 1.45 -3.20 0.06; loop: true; dur: 2100; easing: linear"></a-plane>

  </a-entity>

</a-entity>

</a-scene>

<script>
const target = document.querySelector("#target");
const status = document.querySelector("#status");

function forceLayers() {
  document.querySelectorAll("video").forEach(v => {
    v.style.zIndex = "0";
    v.style.display = "block";
    v.style.opacity = "1";
  });

  document.querySelectorAll("canvas").forEach(c => {
    c.style.zIndex = "999";
    c.style.display = "block";
    c.style.opacity = "1";
    c.style.background = "transparent";
    c.style.pointerEvents = "none";
  });

  document.querySelectorAll("a-scene").forEach(s => {
    s.style.zIndex = "10";
  });
}

setInterval(forceLayers, 200);

target.addEventListener("targetFound", () => {
  status.innerHTML = "WUNDERBAR!";
  status.style.background = "rgba(0,130,0,.75)";
  forceLayers();
});

target.addEventListener("targetLost", () => {
  status.innerHTML = "Richt scanner op de puzzel";
  status.style.background = "rgba(0,0,0,.7)";
});
</script>

</body>
</html>
